services:
  app:
    build:
      context: .
    image: autobio-interview:latest
    container_name: autobio-app
    env_file:
      - .env
    environment:
      DB_PATH: /data/interviews.db
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --workers ${UVICORN_WORKERS:-2}
    volumes:
      - autobio_prod_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  caddy:
    image: caddy:2.10-alpine
    container_name: autobio-caddy
    depends_on:
      app:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  autobio_prod_data:
  caddy_data:
  caddy_config:
