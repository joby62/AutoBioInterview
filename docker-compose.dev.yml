services:
  app:
    build:
      context: .
    container_name: autobio-app-dev
    env_file:
      - .env
    environment:
      DB_PATH: /data/interviews.db
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./:/app
      - autobio_dev_data:/data
    restart: unless-stopped

  caddy:
    image: caddy:2.10-alpine
    container_name: autobio-caddy-dev
    depends_on:
      - app
    ports:
      - "${DEV_HTTP_PORT:-5000}:80"
    volumes:
      - ./deploy/caddy/Caddyfile.dev:/etc/caddy/Caddyfile:ro
    restart: unless-stopped

volumes:
  autobio_dev_data:
