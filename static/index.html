<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数字学习自传访谈</title>
    <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
<div class="orb orb-a"></div>
<div class="orb orb-b"></div>
<canvas id="celebrateCanvas" aria-hidden="true"></canvas>

<div class="app-shell">
    <header class="hero-card glass" id="heroCard">
        <div class="hero-main">
            <div class="hero-copy">
                <p class="hero-kicker">Digital Learning Interview</p>
                <h1>把“写问卷”变成一场有趣的自传对话</h1>
                <p class="hero-sub">回答越具体，生成的自传越真实。你可以随时跳过、撤回或继续修改草稿。</p>
                <div class="hero-meta">
                    <span class="pill pill-stage" id="stageBadge" data-stage="consent_pending">待同意</span>
                    <span class="pill" id="tokenBadge">未开始</span>
                    <span class="pill" id="statsBadge">暂无记录</span>
                </div>
            </div>
            <div class="hero-actions">
                <button class="btn btn-primary" id="newInterviewBtn" onclick="startNewInterview()">开启新访谈</button>
                <button class="btn btn-danger" id="withdrawBtn" onclick="withdrawInterview()">撤回访谈</button>
            </div>
        </div>
        <div class="progress-zone">
            <div class="progress-track" id="progressTrack"></div>
            <div class="ring-box">
                <svg viewBox="0 0 120 120" class="ring-svg" aria-hidden="true">
                    <circle cx="60" cy="60" r="48" class="ring-bg"></circle>
                    <circle cx="60" cy="60" r="48" class="ring-fg" id="progressRingStroke"></circle>
                </svg>
                <div class="ring-text" id="progressRingText">0%</div>
            </div>
        </div>
    </header>

    <section class="guide-card glass">
        <div class="guide-head">
            <div>
                <h2 id="guideTitle">访谈引导</h2>
                <p id="guideDesc"></p>
            </div>
            <button class="btn btn-plain" id="shuffleSparkBtn" onclick="shuffleSparks()">换一组灵感</button>
        </div>
        <div class="chip-row" id="quickChips"></div>
    </section>

    <section class="consent-card glass" id="consentCard">
        <h3>请先确认知情同意</h3>
        <p>内容仅用于研究，发布时会匿名化。你可拒答、跳过、暂停、撤回，也可通过音频/视频转写补充材料。</p>
        <div class="consent-actions">
            <button class="btn btn-primary" id="consentAgreeBtn" onclick="handleConsent(true)">我同意并开始</button>
            <button class="btn btn-plain" id="consentRejectBtn" onclick="handleConsent(false)">不同意参与</button>
        </div>
    </section>

    <section class="chat-card glass">
        <div class="messages" id="messages"></div>
        <div class="composer">
            <div class="composer-meta">
                <span id="wordCounter">0 字</span>
                <span id="statusLine">准备开始</span>
            </div>
            <div class="composer-row">
                <textarea id="userInput" placeholder="输入你的回答（回车发送，Shift+回车换行）" onkeydown="handleInputKey(event)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="发送">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z"/>
                    </svg>
                </button>
            </div>
            <div class="action-row">
                <button class="btn btn-warning" id="skipBtn" onclick="skipQuestion()">跳过本题</button>
                <button class="btn btn-plain" id="altBtn" onclick="openAltModal()">替代提交</button>
                <button class="btn btn-secondary" id="finalizeBtn" onclick="finalizeInterview()">生成草稿</button>
                <div class="review-actions" id="reviewActions">
                    <button class="btn btn-plain" onclick="openDraftModal()">查看草稿</button>
                    <button class="btn btn-plain" onclick="focusRevisionInput()">继续修改</button>
                    <button class="btn btn-primary" onclick="approveFinal()">确认定稿</button>
                </div>
            </div>
        </div>
    </section>
</div>

<div class="modal" id="altModal" onclick="onBackdropClose(event, 'altModal')">
    <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="altModalTitle">
        <h2 id="altModalTitle">替代提交</h2>
        <p class="sheet-sub">你可以贴链接，也可以直接粘贴转写文本。</p>
        <div class="form-grid">
            <label>提交类型
                <select id="altType">
                    <option value="audio">audio</option>
                    <option value="video">video</option>
                    <option value="text_document">text_document</option>
                </select>
            </label>
            <label>链接（可选）
                <input class="field" id="altUrl" placeholder="https://..." />
            </label>
            <label>转写文本（建议）
                <textarea class="field" id="altTranscript" rows="6" placeholder="粘贴音频或视频的转写内容"></textarea>
            </label>
            <label>补充说明（可选）
                <textarea class="field" id="altNote" rows="3" placeholder="例如：这是昨晚散步时录的口述"></textarea>
            </label>
        </div>
        <div class="sheet-actions">
            <button class="btn btn-plain" onclick="closeAltModal()">取消</button>
            <button class="btn btn-primary" id="altSubmitBtn" onclick="submitAlternative()">提交替代材料</button>
        </div>
    </div>
</div>

<div class="modal" id="draftModal" onclick="onBackdropClose(event, 'draftModal')">
    <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="draftModalTitle">
        <h2 id="draftModalTitle">自传草稿</h2>
        <p class="sheet-sub">先通读草稿，再给修改指令，满意后再定稿。</p>
        <pre id="draftContent">尚未生成草稿。</pre>
        <div class="form-grid">
            <label>修改指令
                <textarea class="field" id="reviseInstruction" rows="3" placeholder="例如：减少概括，补充职场阶段具体细节和感受"></textarea>
            </label>
        </div>
        <div class="sheet-actions">
            <button class="btn btn-plain" onclick="closeDraftModal()">关闭</button>
            <button class="btn btn-plain" id="reviseBtn" onclick="reviseDraft()">继续修改草稿</button>
            <button class="btn btn-primary" id="approveBtn" onclick="approveFinal()">确认定稿</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="/static/app.js" defer></script>
</body>
</html>
