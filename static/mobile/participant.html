<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>数字学习自传访谈 · Mobile</title>
    <link rel="stylesheet" href="/static/mobile/mobile.css" />
</head>
<body>
<div class="mobile-shell">
    <header class="mobile-titlebar">
        <p class="tiny-kicker">DIGITAL LEARNING INTERVIEW</p>
        <h1>数字学习自传访谈</h1>
    </header>

    <section class="chat-card" aria-label="mobile interview chat">
        <div class="chat-top">
            <div class="meta-row">
                <span class="badge stage" id="stageBadge">待同意</span>
                <span class="badge" id="progressBadge">0%</span>
                <span class="badge token" id="tokenBadge">会话 --</span>
            </div>
            <h2 id="stageTitle">等待同意开始</h2>
            <p id="stageGoal">同意后进入正式访谈。</p>
            <div class="hint-tags" id="stageHints"></div>
        </div>

        <div class="chat-toolbar">
            <button class="mode-pill" id="speedMenuBtn" type="button" aria-haspopup="true" aria-expanded="false">⚡ 快速</button>
            <button class="ghost-btn" id="shuffleSparkBtn" type="button">换灵感</button>
            <div class="spark-tags" id="sparkList"></div>

            <div class="speed-menu hidden" id="speedMenu" role="menu" aria-label="思考速度">
                <button class="speed-option" data-speed="fast" type="button" role="menuitem">
                    <span class="option-main">快速</span>
                    <span class="option-sub">适合大部分对话</span>
                    <span class="option-check">✓</span>
                </button>
                <button class="speed-option" data-speed="balanced" type="button" role="menuitem">
                    <span class="option-main">中庸</span>
                    <span class="option-sub">信息更平衡</span>
                    <span class="option-check">✓</span>
                </button>
                <button class="speed-option" data-speed="deep" type="button" role="menuitem">
                    <span class="option-main">深度</span>
                    <span class="option-sub">更重推理细节</span>
                    <span class="option-check">✓</span>
                </button>
            </div>
        </div>

        <div class="chat-scroll" id="chatScroll"></div>

        <div class="composer">
            <textarea id="userInput" placeholder="输入回答。双击 Enter 发送；Shift+Enter 换行。"></textarea>
            <div class="composer-footer">
                <span id="composerHint">准备开始</span>
                <button class="send-btn" id="sendBtn" type="button">发送</button>
            </div>
            <div class="composer-actions">
                <button class="action-btn" id="advanceBtn" type="button">下一阶段</button>
                <button class="action-btn secondary" id="summaryBtn" type="button">生成草稿</button>
            </div>
        </div>
    </section>

    <section class="summary-cache" aria-hidden="true">
        <pre id="summaryBox">尚未生成草稿。</pre>
    </section>
</div>

<div class="consent-overlay" id="consentOverlay">
    <div class="consent-modal">
        <h2>开始前确认参与方式</h2>
        <p>你可以跳过问题，也可以随时退出。仅用于研究写作，系统会匿名化处理。</p>
        <div class="consent-actions">
            <button class="action-btn" id="consentAgreeBtn" type="button">我同意并开始</button>
            <button class="action-btn secondary" id="consentDeclineBtn" type="button">不同意参与</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="/static/mobile/mobile.js" defer></script>
</body>
</html>
